<!DOCTYPE html>
<html id="ubol-picker" class="minimized">
<head>
    <meta charset="utf-8">
    <meta name="color-scheme" content="light dark">
    <title>Picker</title>
    <link rel="stylesheet" href="/css/themes/default.css">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/fa-icons.css">
    <link rel="stylesheet" href="/css/tool-overlay-ui.css">
    <link rel="stylesheet" href="/css/picker-ui.css">
</head>
<body class="loading">
    <aside style="right: 2px; bottom: 2px;">
        <section id="windowbar">
            <div id="minimize">
                <svg viewBox="0 0 64 64">
                    <path d="M 16,48 H 48" />
                    <rect x="16" y="16" height="32" width="32" />
                </svg>
            </div>
            <div id="move"></div>
            <div id="quit" data-i18n-title="pickerQuit">
                <svg viewBox="0 0 64 64">
                    <path d="M16 16L48 48M16 48L48 16" />
                </svg>
            </div>
        </section>
        <section id="pickerPanel">
            <div id="loadingIndicator"><div class="spinner"></div></div>
            <div>
                <textarea id="filterText" spellcheck="false"></textarea>
                <div class="resultsetWidgets">
                    <span id="resultsetModifiers">
                        <span id="resultsetDepth" class="resultsetModifier">
                            <span><span></span><span></span><span></span></span>
                            <input type="range" min="0" max="0" value="0">
                        </span>
                        <span id="resultsetSpecificity" class="resultsetModifier">
                            <span><span></span><span></span><span></span></span>
                            <input type="range" min="0" max="0" value="0">
                        </span>
                    </span>
                    <span id="resultsetCount"></span>
                </div>
            </div>
            <div id="toolbar">
                <div>
                    <button id="pick" type="button" data-i18n="pickerPick">_<span class="hover"></span></button>
                    <button id="preview" type="button" data-i18n="pickerPreview">_<span class="hover"></span></button>
                </div>
                <button id="create" type="button" class="preferred" disabled data-i18n="pickerCreate">_<span class="hover"></span></button>
            </div>
        </section>
        <ul id="candidateFilters">
            <li id="cosmeticFilters">
                <span data-i18n="pickerCosmeticFilters">_</span>
                <ul lang="en" class="changeFilter"></ul>
            </li>
        </ul>
    </aside>

    <svg id="overlay">
        <path d></path>
        <path d="M0 0"></path>
    </svg>

    <div id="tooltip"></div>

    <script src="/js/fa-icons-bundle.js"></script>
    <script src="/js/i18n-bundle.js"></script>
    <script src="/js/scripting/tool-overlay-ui.js"></script>
    <script src="/js/scripting/picker-ui.js"></script>
</body>
</html>
